<div class="controle-estoque">
  <h2>Controle de Estoque</h2>

  <div class="alerta-estoque-baixo" *ngIf="estoqueBaixo.length > 0" role="alert" aria-live="polite">
    <strong>⚠️ Estoque Baixo</strong>
    <ul>
      <li *ngFor="let item of estoqueBaixo">
        <span class="emoji">{{ item.emoji }}</span> {{ item.nome }}
        <span class="quantidade">{{ item.atual }} / mín. {{ item.minimo }}</span>
      </li>
    </ul>
  </div>

  <section class="movimentacao">
    <header class="tabs">
      <button
        [class.active]="tipoMovimentacao === 'entrada'"
        (click)="alternarTipo('entrada')"
        aria-pressed="{{ tipoMovimentacao === 'entrada' }}"
        type="button"
      >
        📦 Entrada
      </button>
      <button
        [class.active]="tipoMovimentacao === 'saida'"
        (click)="alternarTipo('saida')"
        aria-pressed="{{ tipoMovimentacao === 'saida' }}"
        type="button"
      >
        📤 Saída
      </button>
    </header>

    <form (ngSubmit)="registrarMovimentacao()" class="form-movimentacao" #form="ngForm" novalidate>
      <select
        required
        [(ngModel)]="produtoSelecionado"
        name="produto"
        aria-label="Selecione o produto"
      >
        <option value="" disabled selected>Selecione o produto</option>
        <option *ngFor="let produto of produtos" [value]="produto">{{ produto }}</option>
      </select>

      <input
        type="number"
        min="1"
        required
        placeholder="Quantidade"
        [(ngModel)]="quantidade"
        name="quantidade"
        aria-label="Quantidade"
      />

      <input
        type="text"
        placeholder="Obs (opcional)"
        [(ngModel)]="observacao"
        name="observacao"
        aria-label="Observação"
      />

      <button type="button" (click)="registrarMovimentacao()" class="btn-registrar">
        + Registrar {{ tipoMovimentacao === 'entrada' ? 'Entrada' : 'Saída' }}
      </button>
    </form>
  </section>

  <section class="historico">
    <h3>Histórico de Movimentações</h3>
    <p>Nenhuma movimentação registrada.</p>
  </section>
  <app-navbar></app-navbar>
</div>
