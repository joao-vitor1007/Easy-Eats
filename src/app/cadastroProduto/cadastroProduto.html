<div class="page-container">
  <div class="header-section">
    <h1>Novo Produto</h1>
    <button class="btn-voltar" routerLink="/controle-estoque">Voltar</button>
  </div>

  <div class="card-form">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <div class="input-group">
        <label>Nome do Produto</label>
        <input type="text" placeholder="Ex: Hambúrguer Clássico" formControlName="nome" />
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Categoria</label>
          <input type="text" placeholder="Lanches, Bebidas..." formControlName="categoria" />
        </div>

        <div class="input-group">
          <label>Preço (R$)</label>
          <input type="number" step="0.01" placeholder="0.00" formControlName="preco" />
        </div>
      </div>

      <div class="input-group">
        <label>Quantidade em Estoque</label>
        <input type="number" placeholder="Ex: 50" formControlName="estoque" />
      </div>

      <div class="actions">
        <button type="submit" class="btn-save" [disabled]="form.invalid">
          <span>+</span> Cadastrar Produto
        </button>
      </div>
    </form>
  </div>

  <app-navbar></app-navbar>
</div>
