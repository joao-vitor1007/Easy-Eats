<div class="container">
  <div class="login-box">
    <div class="header">
      <div class="logo">
        <img src="/assets/images/logo-easyeats-carrinho2.png" />
      </div>

      <h1>Easy<span>Eats</span></h1>
      <p>Área do Garçom</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="handleLogin()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="seu@email.com" formControlName="email" />

        <small *ngIf="form.get('email')?.touched && form.get('email')?.errors">
          <span *ngIf="form.get('email')?.errors?.['required']">
            <p class="msg-validacoes">{{ mensagensValidacoes.email.required }}</p>
          </span>
          <span *ngIf="form.get('email')?.errors?.['email']">
            <p class="msg-validacoes">{{ mensagensValidacoes.email.required }}</p>
          </span>
        </small>
      </div>

      <div class="form-group">
        <label>Senha</label>

        <div class="password-field">
          <div class="input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••"
              formControlName="password"
            />
            <button type="button" (click)="togglePassword()" class="btn-mostrar-senha">
              {{ showPassword ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
        </div>

        <small *ngIf="form.get('password')?.touched && form.get('password')?.errors">
          <p class="msg-validacoes">{{ mensagensValidacoes.password.required }}</p>
        </small>
      </div>

      <button type="submit" class="btn-padrao">Entrar</button>
    </form>

    <p class="footer">EasyEats POS © {{ currentYear }}</p>
  </div>
</div>
