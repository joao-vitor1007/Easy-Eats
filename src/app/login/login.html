<div class="container">

  <div class="login-box">

    <div class="header">
      <div class="logo">
        🚚
      </div>

      <h1>Food<span>Truck</span></h1>
      <p>Área do Garçom</p>
    </div>

    <form (submit)="handleLogin($event)">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          placeholder="seu@email.com"
          [(ngModel)]="email"
          name="email"
        />
      </div>

      <div class="form-group">
        <label>Senha</label>

        <div class="password-field">

          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
          />

          <button
            type="button"
            (click)="togglePassword()"
            class="toggle-password"
          >
            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
          </button>

        </div>
      </div>

      <button type="submit" class="login-button">
        Entrar
      </button>

    </form>

    <p class="footer">
      FoodTruck POS © {{ currentYear }}
    </p>

  </div>

</div>
